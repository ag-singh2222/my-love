<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Gallery</title>
  <link rel="shortcut icon" href="photo/we2.png" type="image/x-icon">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    h1 {
      text-align: center;
      padding: 15px;
      color: #ef3106;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.3);
      font-size: 2em;
      margin: 0;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 16px rgba(0,0,0,0.25);
    }

    .card img {
      width: 100%;
      height: 800px;
      object-fit: cover;
      display: block;
    }

    .caption {
      padding: 10px;
      text-align: center;
      font-weight: bold;
      color: #333;
      font-size: 0.95em;
    }

    .button {
      display: inline-block;
      padding: 12px 20px;
      background: #ef3106;
      color: #fff;
      border-radius: 20px;
      text-decoration: none;
      font-size: 1.1em;
      transition: background 0.3s ease;
    }

    .button:hover {
      background: #d42a05;
    }

    /* Tablet adjustments */
    @media (max-width: 768px) {
      h1 {
        font-size: 1.6em;
      }
      .card img {
        height: 140px;
      }
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      h1 {
        font-size: 1.4em;
        padding: 10px;
      }
      .gallery {
        grid-template-columns: 1fr; /* stack cards vertically */
      }
      .card img {
        height: 800px;
      }
      .button {
        font-size: 1em;
        padding: 10px 16px;
      }
    }
  </style>
</head>
<body>
  <h1>🌈 Our Love Gallery</h1>
  <div class="gallery">
    <div class="card">
      <img src="photo/we2.png" alt="Image 1">
      <div class="caption">We are ....</div>
    </div>
    <div class="card">
      <img src="photo/we.png" alt="Image 2">
      <div class="caption">Our Love</div>
    </div>
    <div class="card">
      <img src="photo/you2.png" alt="Image 3">
      <div class="caption">For You</div>
    </div>
  </div>

  <div style="text-align:center; margin: 20px;">
    <a href="About.html" class="button">For You</a>
  </div>
</body>
</html>
